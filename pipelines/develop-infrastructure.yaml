resources:
  repositories:
  - repository: templates
    type: git
    name: DevOps/Amrock.DevOps.Pipelines.Templates.Cloud
    ref: refs/tags/stable

trigger:
  branches:
    include:
      - develop
  paths:
    include:
      - infrastructure

variables:
- group: common

stages:
#publish variables
- template: stages/publish-pipeline-artifacts.yaml@templates
  parameters:
    stageName: infrastructure
    artifactName: infrastructure
    publishPath: infrastructure

# scalr-deploy
- template: stages/scalr-deploy.yaml@templates
  parameters:
    repoName: SizingTool
    environments:
    - stageName: infrastructure_test
      environment: test
      dependsOn: publish_pipeline_artifacts_infrastructure
      poolName: Amrock_NonProd_AWS_ADO_Runner
      scalrEnvironmentName: AR-Shared NonProd-517666809163
      terraformPath: infrastructure/517666809163/us-east-1/test
      workspaceName: test-222530-us-east-1-tapsizingtool